name: Mobile Dev Test Lab

on: [push]

jobs:
  test-lab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build APKs
        run: chmod +x gradlew && ./gradlew assembleDebug assembleDebugAndroidTest

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run Test Lab
        run: |
          gcloud firebase test android run \
            --type instrumentation \
            --app app/build/outputs/apk/debug/app-debug.apk \
            --test app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk \
            --device model=pixel7,version=33

      - name: Download Logs on Failure
        if: failure()
        run: |
          BUCKET=$(gcloud firebase test android run --app app/build/outputs/apk/debug/app-debug.apk --test app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk --format="value(resultsBucket)" 2>/dev/null || echo "")
          if [ -n "$BUCKET" ]; then
            gsutil -m cp -r gs://$BUCKET/ ./test-logs/
          fi

      - name: Upload Test Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: ./test-logs/
          retention-days: 7

      - name: Feed Logs to AI
        if: failure()
        run: |
          if [ -f "./test-logs/logcat" ]; then
            curl -X POST https://api.opencode.ai/v1/agent/fix \
              -H "Authorization: Bearer ${{ secrets.OPENCODE_API_KEY }}" \
              -F "logs=@./test-logs/logcat" \
              -F "repo=https://github.com/tonygrischke-art/bigtype-ai"
          fi